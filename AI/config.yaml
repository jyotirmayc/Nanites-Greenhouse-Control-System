model_dir: ../models

training:
  data_path: data/synthetic_greenhouse_7days_10min.csv  # Path relative to AI/ directory
  irrigation_features:
    - soil_lag1
    - soil_roll_6
    - ppfd_roll_6
    - T
    - RH
    - ext_T
    - hour
  anomaly_features:
    - T
    - RH
    - soil_theta
    - PPFD
    - CO2
  contamination: 0.01
  random_state: 42
  horizon_steps: 36        # 36 steps × timestep_minutes = 6 hours (with 10-min timestep)
  timestep_minutes: 10

control:
  soil_min: 0.28
  soil_target: 0.32
  T_set: 24.0
  T_deadband: 1.0
  irrigation_max_sec: 60
  irrigation_min_sec: 8
  cmd_expires_s: 180

fallback:
  cloud_timeout_s: 90
